<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <span class="logo">🏫 SchoolMS</span>
    </div>
    <div class="nav-right">
      <select id="roleSelect">
        <option value="admin">Admin Panel</option>
        <option value="teacher">Teacher Panel</option>
        <option value="student">Student Panel</option>
        <option value="parent">Parent Panel</option>
      </select>
    </div>
  </nav>

  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent"></main>
  </div>

  <script src="script.js"></script>
  <button onclick="goToDashboard()" class="back-btn">⬅ Back to Dashboard</button>
</body>
</html>
