<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">🏫 Teacher Management</nav>

  <div class="container">
    <div class="main-content">
      <h2>Teachers</h2>

      <!-- Add Teacher Form -->
      <div class="form-group">
        <input type="text" id="teacherName" placeholder="Name">
        <input type="text" id="teacherSubject" placeholder="Subject">
        <button onclick="addTeacher()">Add Teacher</button>
      </div>

      <!-- Teachers Table -->
      <table >
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="teacherTable"></tbody>
      </table>

      <!-- Back Button -->
      <button onclick="goToDashboard()" class="back-btn">⬅ Back to Dashboard</button>

    </div>
  </div>

  <script src="teacher.js"></script>
</body>
</html>
