<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">🏫 Student Management</nav>

  <div class="container">
    <div class="main-content">
      <h2>Students</h2>

      <!-- Add Student Form -->
      <div class="form-group">
        <input type="text" id="studentName" placeholder="Name">
        <input type="text" id="studentClass" placeholder="Class">
        <input type="number" id="studentMarks" placeholder="Marks">
        <button onclick="addStudent()">Add Student</button>
        
      </div>

      <!-- Students Table -->
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Marks</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="studentTable"></tbody>
      </table>

      <!-- Back Button -->
      <button onclick="goToDashboard()" class="back-btn">
        ⬅ Back to Dashboard
      </button>
    </div>
  </div>

  <!-- JS FILE -->
  <script src="student.js"></script>
</body>
</html>
